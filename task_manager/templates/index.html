<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopWise - Gestor de Tareas Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-main {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .task-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }

        .task-item.completed {
            opacity: 0.6;
            border-left-color: #10b981;
        }

        .task-item.high-priority {
            border-left-color: #ef4444;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-text {
            flex: 1;
            margin-left: 12px;
            font-size: 15px;
            color: #333;
        }

        .btn-base {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0 4px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .priority-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }

        .priority-low {
            background: #dbeafe;
            color: #1e40af;
        }

        .priority-normal {
            background: #fef3c7;
            color: #92400e;
        }

        .priority-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .checkbox-custom {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-custom:checked {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox-custom:checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .input-field {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            background: white;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-field::placeholder {
            color: #999;
        }

        .header-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 20px 20px 0 0;
            margin-bottom: 30px;
        }

        .header-gradient h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header-gradient p {
            font-size: 16px;
            opacity: 0.9;
        }

        .task-counter {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #666;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-group input {
            flex: 1;
        }

        .select-field {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            background: white;
            cursor: pointer;
        }

        .select-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .no-tasks-icon {
            display: inline-block;
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="glass-effect overflow-hidden">
            <div class="header-gradient">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h1><i class="fas fa-rocket"></i> TopWise</h1>
                        <p>Tu gestor de tareas inteligente y poderoso</p>
                        <div class="task-counter">
                            <span id="totalTasks">0</span> tareas • 
                            <span id="completedTasks">0</span> completadas
                        </div>
                    </div>
                    <div style="font-size: 60px; opacity: 0.3;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
            </div>

            <div style="padding: 30px;">
                <!-- Agregar Nueva Tarea -->
                <div style="margin-bottom: 30px;">
                    <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #333;">
                        <i class="fas fa-plus-circle" style="color: #667eea;"></i> Nueva Tarea
                    </h2>
                    <div class="form-group">
                        <input type="text" id="taskInput" class="input-field" placeholder="¿Qué necesitas hacer? Describe tu tarea aquí..." />
                        <select id="prioritySelect" class="select-field" style="width: 120px;">
                            <option value="low">✓ Baja</option>
                            <option value="normal" selected>● Normal</option>
                            <option value="high">⚠ Alta</option>
                        </select>
                        <button onclick="addTask()" class="btn-base btn-primary">
                            <i class="fas fa-plus"></i> Agregar
                        </button>
                    </div>
                </div>

                <!-- Línea Divisoria -->
                <div style="border-top: 2px solid #f0f0f0; margin: 30px 0;"></div>

                <!-- Lista de Tareas -->
                <div>
                    <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #333;">
                        <i class="fas fa-tasks" style="color: #667eea;"></i> Mis Tareas
                    </h2>
                    <div id="taskList" style="min-height: 200px;">
                        <div class="empty-state">
                            <div class="no-tasks-icon">
                                <i class="fas fa-inbox"></i>
                            </div>
                            <h2>No hay tareas</h2>
                            <p>Crea tu primera tarea para empezar</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables Globales
        let tasks = [];

        // Funciones Principales
        function loadTasks() {
            document.getElementById('taskList').innerHTML = '<div class="loading" style="margin: 20px auto;"></div>';
            
            fetch('/api/tasks')
                .then(response => response.json())
                .then(data => {
                    tasks = data;
                    renderTasks();
                    updateCounters();
                })
                .catch(error => {
                    console.error('Error al cargar tareas:', error);
                    showToast('Error al cargar las tareas', 'error');
                });
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="no-tasks-icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <h2>No hay tareas</h2>
                        <p>Crea tu primera tarea para empezar</p>
                    </div>
                `;
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''} ${task.priority === 'high' ? 'high-priority' : ''}">
                    <div style="display: flex; align-items: center; flex: 1;">
                        <input 
                            type="checkbox" 
                            class="checkbox-custom" 
                            ${task.completed ? 'checked' : ''} 
                            onchange="toggleTask(${task.id})"
                        />
                        <span class="task-text">
                            <span class="priority-badge priority-${task.priority}">
                                ${getPriorityLabel(task.priority)}
                            </span>
                            ${task.description}
                        </span>
                    </div>
                    <div>
                        <button onclick="editTask(${task.id})" class="btn-base" style="background: #3b82f6; color: white; padding: 8px 12px;">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteTask(${task.id})" class="btn-base btn-danger" style="padding: 8px 12px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getPriorityLabel(priority) {
            const labels = {
                'low': '✓ Baja',
                'normal': '● Normal',
                'high': '⚠ Alta'
            };
            return labels[priority] || priority;
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const description = input.value.trim();

            if (description === '') {
                showToast('Por favor, ingresa una descripción', 'error');
                input.focus();
                return;
            }

            fetch('/api/tasks', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    description: description,
                    priority: priority 
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Error al crear tarea');
                return response.json();
            })
            .then(newTask => {
                tasks.unshift(newTask);
                input.value = '';
                document.getElementById('prioritySelect').value = 'normal';
                renderTasks();
                updateCounters();
                showToast('¡Tarea creada exitosamente!', 'success');
                input.focus();
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('Error al crear la tarea', 'error');
            });
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ completed: !task.completed })
            })
            .then(response => response.json())
            .then(updatedTask => {
                const index = tasks.findIndex(t => t.id === id);
                tasks[index] = updatedTask;
                renderTasks();
                updateCounters();
                showToast(updatedTask.completed ? '✓ Tarea completada' : '↻ Tarea marcada como incompleta', 'success');
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('Error al actualizar la tarea', 'error');
            });
        }

        function deleteTask(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar esta tarea?')) return;

            fetch(`/api/tasks/${id}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (!response.ok) throw new Error('Error al eliminar tarea');
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
                updateCounters();
                showToast('Tarea eliminada', 'success');
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('Error al eliminar la tarea', 'error');
            });
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) {
                showToast('Tarea no encontrada', 'error');
                return;
            }

            // Crear modal de edición
            const modalHTML = `
                <div id="editModal" style="
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.5);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 10000;
                ">
                    <div style="
                        background: white;
                        border-radius: 15px;
                        padding: 30px;
                        width: 90%;
                        max-width: 500px;
                        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                    ">
                        <h2 style="margin-top: 0; color: #333; font-size: 20px;">✏️ Editar Tarea</h2>
                        <textarea id="editInput" style="
                            width: 100%;
                            padding: 12px;
                            border: 2px solid #e5e7eb;
                            border-radius: 10px;
                            font-size: 15px;
                            font-family: inherit;
                            resize: vertical;
                            min-height: 80px;
                            margin-bottom: 15px;
                        ">${task.description}</textarea>
                        
                        <div style="display: flex; gap: 10px; justify-content: flex-end;">
                            <button onclick="closeEditModal()" style="
                                padding: 10px 20px;
                                border: 2px solid #e5e7eb;
                                background: white;
                                color: #666;
                                border-radius: 8px;
                                cursor: pointer;
                                font-weight: 600;
                            ">Cancelar</button>
                            <button onclick="saveEditTask(${id})" style="
                                padding: 10px 20px;
                                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                                color: white;
                                border: none;
                                border-radius: 8px;
                                cursor: pointer;
                                font-weight: 600;
                            ">Guardar</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            document.getElementById('editInput').focus();
            
            // Cerrar modal al presionar Escape
            const handleEscape = (e) => {
                if (e.key === 'Escape') {
                    closeEditModal();
                    document.removeEventListener('keydown', handleEscape);
                }
            };
            document.addEventListener('keydown', handleEscape);
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            if (modal) {
                modal.style.opacity = '0';
                setTimeout(() => modal.remove(), 300);
            }
        }

        function saveEditTask(id) {
            const newDescription = document.getElementById('editInput').value.trim();
            
            if (newDescription === '') {
                showToast('La descripción no puede estar vacía', 'error');
                return;
            }

            closeEditModal();

            fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ description: newDescription })
            })
            .then(response => {
                if (!response.ok) throw new Error('Error al actualizar');
                return response.json();
            })
            .then(updatedTask => {
                const index = tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    tasks[index] = updatedTask;
                    renderTasks();
                    showToast('✓ Tarea actualizada', 'success');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('Error al actualizar la tarea', 'error');
            });
        }

        function updateCounters() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Permitir agregar tarea con Enter
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Cargar tareas al iniciar
        loadTasks();
    </script>
</body>
</html>
